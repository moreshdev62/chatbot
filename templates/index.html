<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoreshAI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a;
  --sidebar: #111111;
  --surface: #1a1a1a;
  --border: #222222;
  --border2: #2e2e2e;
  --text: #f5f5f5;
  --text2: #777777;
  --text3: #444444;
  --accent: #f5f5f5;
  --user-bubble: #1a1a1a;
}
html, body { height: 100%; overflow: hidden; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; font-size: 14px; line-height: 1.6; }
.sidebar { width: 240px; flex-shrink: 0; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 16px; border-bottom: 1px solid var(--border); }
.logo-circle { width: 28px; height: 28px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
.logo-circle img { width: 100%; height: 100%; object-fit: cover; }
.logo-name { font-size: 14px; font-weight: 500; color: var(--text); letter-spacing: -0.2px; }
.logo-badge { margin-left: auto; font-size: 9px; color: var(--text3); border: 1px solid var(--border2); padding: 1px 6px; border-radius: 4px; }
.new-chat-btn { margin: 10px 8px; padding: 8px 12px; background: none; border: 1px solid var(--border2); border-radius: 6px; color: var(--text2); font-family: 'Inter', sans-serif; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 7px; transition: border-color 0.15s, color 0.15s; }
.new-chat-btn:hover { border-color: var(--text3); color: var(--text); }
.new-chat-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; }
.sidebar-label { padding: 12px 16px 4px; font-size: 10px; color: var(--text3); letter-spacing: 0.5px; text-transform: uppercase; }
.history-item { padding: 7px 16px; font-size: 13px; color: var(--text2); cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.1s; }
.history-item:hover { color: var(--text); }
.history-item.active { color: var(--text); }
.sidebar-footer { margin-top: auto; padding: 12px 8px; border-top: 1px solid var(--border); }
.model-pill { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 6px; font-size: 11px; color: var(--text3); }
.online-dot { width: 5px; height: 5px; border-radius: 50%; background: #3d3d3d; flex-shrink: 0; animation: blink 3s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.menu-btn { display: none; width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 6px; background: none; color: var(--text2); cursor: pointer; align-items: center; justify-content: center; flex-shrink: 0; }
.menu-btn svg { width: 14px; height: 14px; }
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9; }
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.topbar { height: 48px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; flex-shrink: 0; gap: 10px; }
.topbar-name { font-size: 13px; font-weight: 400; color: var(--text2); }
.topbar-right { margin-left: auto; }
.tbtn { width: 30px; height: 30px; border: 1px solid var(--border); border-radius: 6px; background: none; color: var(--text3); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color 0.15s, border-color 0.15s; }
.tbtn:hover { color: var(--text2); border-color: var(--border2); }
.tbtn svg { width: 13px; height: 13px; }
#chat { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
#chat::-webkit-scrollbar { width: 3px; }
#chat::-webkit-scrollbar-thumb { background: var(--border2); }
.chat-inner { max-width: 640px; margin: 0 auto; padding: 32px 20px; display: flex; flex-direction: column; gap: 24px; }
.welcome { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 60px 0 20px; gap: 14px; animation: rise 0.4s ease; }
.welcome-avatar { width: 56px; height: 56px; border-radius: 50%; background: white; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.welcome-avatar img { width: 100%; height: 100%; object-fit: cover; }
.welcome h1 { font-size: 22px; font-weight: 500; color: var(--text); letter-spacing: -0.5px; }
.welcome-sub { font-size: 13px; color: var(--text2); }
.chips { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 8px; width: 100%; max-width: 420px; }
.chip { padding: 9px 12px; background: none; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; color: var(--text2); cursor: pointer; text-align: left; font-family: 'Inter', sans-serif; transition: border-color 0.15s, color 0.15s; line-height: 1.4; }
.chip:hover { border-color: var(--border2); color: var(--text); }
.message { display: flex; gap: 10px; animation: rise 0.2s ease; }
.message.user { flex-direction: row-reverse; }
@keyframes rise { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.msg-avatar { width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 500; margin-top: 2px; }
.message.bot .msg-avatar { background: white; }
.message.bot .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
.message.user .msg-avatar { background: var(--surface); border: 1px solid var(--border); color: var(--text2); }
.msg-body { flex: 1; min-width: 0; }
.msg-name { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
.message.user .msg-name { text-align: right; }
.msg-text { font-size: 14px; line-height: 1.7; color: var(--text); white-space: pre-wrap; word-break: break-word; }
.message.user .msg-text { background: var(--user-bubble); border: 1px solid var(--border); border-radius: 10px 2px 10px 10px; padding: 10px 14px; display: inline-block; float: right; clear: both; max-width: 85%; }
.typing-indicator { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
.typing-indicator span { width: 5px; height: 5px; border-radius: 50%; background: var(--text3); animation: bounce 1.2s ease-in-out infinite; }
.typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-4px);opacity:1} }
.input-area { border-top: 1px solid var(--border); padding: 12px 20px 16px; flex-shrink: 0; }
.input-box { max-width: 640px; margin: 0 auto; }
.input-wrap { display: flex; align-items: flex-end; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 10px 10px 14px; transition: border-color 0.15s; }
.input-wrap:focus-within { border-color: var(--border2); }
#input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; resize: none; min-height: 20px; max-height: 140px; line-height: 1.6; overflow-y: auto; scrollbar-width: none; }
#input::-webkit-scrollbar { display: none; }
#input::placeholder { color: var(--text3); }
#send { width: 32px; height: 32px; border-radius: 6px; background: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.15s; }
#send:hover { opacity: 0.8; }
#send:active { opacity: 0.6; }
#send:disabled { opacity: 0.2; cursor: not-allowed; }
#send svg { width: 14px; height: 14px; fill: black; }
.input-hint { text-align: center; font-size: 10px; color: var(--text3); margin-top: 8px; }
@media (max-width: 768px) {
  .sidebar { position: fixed; left: -240px; top: 0; bottom: 0; z-index: 10; transition: left 0.2s ease; }
  .sidebar.open { left: 0; }
  .sidebar-overlay.open { display: block; }
  .menu-btn { display: flex; }
  .chat-inner { padding: 20px 14px; gap: 18px; }
  .welcome { padding: 40px 0 16px; }
  .welcome h1 { font-size: 20px; }
  .chips { grid-template-columns: 1fr; max-width: 100%; }
  .input-area { padding: 10px 12px 14px; }
  .input-hint { display: none; }
  .message.user .msg-text { max-width: 90%; }
}
</style>
</head>
<body>
<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-circle"><img src="https://i.ibb.co/zWrHgfhF/image.jpg" alt="M" onerror="this.parentElement.textContent='M'"></div>
    <span class="logo-name">MoreshAI</span>
    <span class="logo-badge">beta</span>
  </div>
  <button class="new-chat-btn" onclick="newChat()">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Новый чат
  </button>
  <div class="sidebar-label">Сегодня</div>
  <div class="history-item active" id="hist-current">Новый чат</div>
  <div class="sidebar-footer">
    <div class="model-pill"><div class="online-dot"></div>llama-3.3-70b</div>
  </div>
</div>
<div class="main">
  <div class="topbar">
    <button class="menu-btn" onclick="openSidebar()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <span class="topbar-name" id="topbar-name">MoreshAI</span>
    <div class="topbar-right">
      <button class="tbtn" onclick="newChat()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.95"/></svg>
      </button>
    </div>
  </div>
  <div id="chat">
    <div class="chat-inner" id="chat-inner">
      <div class="welcome" id="welcome">
        <div class="welcome-avatar"><img src="https://i.ibb.co/zWrHgfhF/image.jpg" alt="M" onerror="this.parentElement.textContent='M'"></div>
        <h1>Привет, я MoreshAI</h1>
        <p class="welcome-sub">Задай любой вопрос — я помогу</p>
        <div class="chips">
          <button class="chip" onclick="useChip(this)">Что такое чёрная дыра?</button>
          <button class="chip" onclick="useChip(this)">Напиши стихотворение</button>
          <button class="chip" onclick="useChip(this)">Как выучить Python?</button>
          <button class="chip" onclick="useChip(this)">Объясни квантовую физику</button>
        </div>
      </div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-box">
      <div class="input-wrap">
        <textarea id="input" placeholder="Напиши сообщение..." rows="1"></textarea>
        <button id="send" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
        </button>
      </div>
      <div class="input-hint">Enter — отправить · Shift+Enter — новая строка</div>
    </div>
  </div>
</div>
<script>
const chatEl=document.getElementById("chat"),inner=document.getElementById("chat-inner"),inputEl=document.getElementById("input"),sendBtn=document.getElementById("send"),welcome=document.getElementById("welcome");
let isFirst=true;
function openSidebar(){document.getElementById("sidebar").classList.add("open");document.getElementById("overlay").classList.add("open");}
function closeSidebar(){document.getElementById("sidebar").classList.remove("open");document.getElementById("overlay").classList.remove("open");}
function useChip(btn){inputEl.value=btn.textContent;sendMessage();}
function newChat(){inner.innerHTML='';inner.appendChild(welcome);welcome.style.display='';isFirst=true;inputEl.value='';inputEl.style.height='20px';document.getElementById("hist-current").textContent="Новый чат";document.getElementById("topbar-name").textContent="MoreshAI";closeSidebar();}
inputEl.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}});
inputEl.addEventListener("input",()=>{inputEl.style.height="20px";inputEl.style.height=Math.min(inputEl.scrollHeight,140)+"px";});
function addMsg(text,role){
  if(isFirst){welcome.style.display='none';const label=text.slice(0,30)+(text.length>30?"…":"");document.getElementById("hist-current").textContent=label;document.getElementById("topbar-name").textContent=label;isFirst=false;}
  const wrap=document.createElement("div");wrap.className=`message ${role}`;
  const av=document.createElement("div");av.className="msg-avatar";
  if(role==="bot"){av.innerHTML=`<img src="https://i.ibb.co/zWrHgfhF/image.jpg" alt="M" onerror="this.parentElement.textContent='M'">`;}else{av.textContent="Я";}
  const body=document.createElement("div");body.className="msg-body";
  const name=document.createElement("div");name.className="msg-name";name.textContent=role==="bot"?"MoreshAI":"Вы";
  const txt=document.createElement("div");txt.className="msg-text";txt.textContent=text;
  body.appendChild(name);body.appendChild(txt);wrap.appendChild(av);wrap.appendChild(body);inner.appendChild(wrap);chatEl.scrollTop=chatEl.scrollHeight;
}
function addTyping(){
  const wrap=document.createElement("div");wrap.className="message bot";wrap.id="typing";
  const av=document.createElement("div");av.className="msg-avatar";av.innerHTML=`<img src="https://i.ibb.co/zWrHgfhF/image.jpg" alt="M" onerror="this.parentElement.textContent='M'">`;
  const body=document.createElement("div");body.className="msg-body";
  const name=document.createElement("div");name.className="msg-name";name.textContent="MoreshAI";
  const dots=document.createElement("div");dots.className="typing-indicator";dots.innerHTML="<span></span><span></span><span></span>";
  body.appendChild(name);body.appendChild(dots);wrap.appendChild(av);wrap.appendChild(body);inner.appendChild(wrap);chatEl.scrollTop=chatEl.scrollHeight;
}
async function sendMessage(){
  const text=inputEl.value.trim();if(!text||sendBtn.disabled)return;
  inputEl.value="";inputEl.style.height="20px";sendBtn.disabled=true;
  addMsg(text,"user");addTyping();
  try{
    const res=await fetch("/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:text})});
    const data=await res.json();document.getElementById("typing")?.remove();addMsg(data.reply,"bot");
  }catch{document.getElementById("typing")?.remove();addMsg("Ошибка соединения.","bot");}
  sendBtn.disabled=false;inputEl.focus();
}
</script>
</body>
</html>
