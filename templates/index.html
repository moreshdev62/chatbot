<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoreshAI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0d; --sidebar: #111111; --surface: #1a1a1a; --surface2: #222222;
  --border: #2a2a2a; --border2: #333333; --accent: #6366f1; --accent2: #818cf8;
  --accent-glow: rgba(99,102,241,0.15); --text: #f1f1f1; --text2: #a0a0a0;
  --text3: #505050; --user-bubble: #1e1e2e; --radius: 12px;
}
html, body { height: 100%; overflow: hidden; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; font-size: 15px; line-height: 1.6; }
.sidebar { width: 256px; flex-shrink: 0; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 18px 16px; border-bottom: 1px solid var(--border); }
.logo-img { width: 32px; height: 32px; border-radius: 50%; overflow: hidden; background: var(--surface2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px; font-weight: 600; color: var(--accent2); }
.logo-img img { width: 100%; height: 100%; object-fit: cover; }
.logo-name { font-size: 16px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
.logo-badge { margin-left: auto; font-size: 10px; font-family: 'DM Mono', monospace; color: var(--accent2); background: var(--accent-glow); border: 1px solid rgba(99,102,241,0.25); padding: 2px 7px; border-radius: 20px; }
.new-chat-btn { margin: 12px 10px; padding: 9px 14px; background: var(--accent); border: none; border-radius: 10px; color: white; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 7px; transition: background 0.2s, transform 0.1s; }
.new-chat-btn:hover { background: #4f46e5; }
.new-chat-btn:active { transform: scale(0.98); }
.new-chat-btn svg { width: 14px; height: 14px; stroke: white; fill: none; stroke-width: 2.5; }
.sidebar-label { padding: 10px 16px 4px; font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); }
.history-item { padding: 8px 16px; font-size: 13px; color: var(--text2); cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-radius: 8px; margin: 1px 6px; transition: background 0.15s, color 0.15s; }
.history-item:hover { background: var(--surface); color: var(--text); }
.history-item.active { background: var(--surface); color: var(--text); }
.sidebar-footer { margin-top: auto; padding: 12px 10px; border-top: 1px solid var(--border); }
.model-pill { display: flex; align-items: center; gap: 8px; padding: 9px 12px; background: var(--surface); border-radius: 10px; font-size: 11px; color: var(--text2); font-family: 'DM Mono', monospace; }
.online-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; flex-shrink: 0; animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
.topbar { height: 54px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; flex-shrink: 0; gap: 10px; }
.topbar-name { font-size: 14px; font-weight: 500; color: var(--text2); }
.topbar-right { margin-left: auto; display: flex; gap: 6px; }
.tbtn { width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 8px; background: none; color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.tbtn:hover { background: var(--surface); color: var(--text); border-color: var(--border2); }
.tbtn svg { width: 15px; height: 15px; }
#chat { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
#chat::-webkit-scrollbar { width: 4px; }
#chat::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.chat-inner { max-width: 700px; margin: 0 auto; padding: 32px 20px; display: flex; flex-direction: column; gap: 28px; }
.welcome { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 48px 0 20px; gap: 14px; animation: rise 0.5s ease; }
.welcome-avatar { width: 68px; height: 68px; border-radius: 50%; overflow: hidden; background: var(--surface2); border: 2px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 26px; color: var(--accent2); }
.welcome-avatar img { width: 100%; height: 100%; object-fit: cover; }
.welcome h1 { font-size: 24px; font-weight: 600; color: var(--text); letter-spacing: -0.4px; }
.welcome-sub { font-size: 14px; color: var(--text2); }
.chips { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px; width: 100%; max-width: 460px; }
.chip { padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; font-size: 13px; color: var(--text2); cursor: pointer; text-align: left; font-family: 'DM Sans', sans-serif; transition: all 0.15s; line-height: 1.4; }
.chip:hover { background: var(--surface2); border-color: var(--accent); color: var(--text); }
.message { display: flex; gap: 12px; animation: rise 0.2s ease; }
.message.user { flex-direction: row-reverse; }
@keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg-avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; margin-top: 4px; font-family: 'DM Mono', monospace; }
.message.bot .msg-avatar { background: var(--surface2); border: 1px solid var(--border2); }
.message.bot .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
.message.user .msg-avatar { background: var(--accent-glow); border: 1px solid rgba(99,102,241,0.3); color: var(--accent2); }
.msg-body { flex: 1; min-width: 0; }
.msg-name { font-size: 11px; font-weight: 600; color: var(--text3); margin-bottom: 5px; font-family: 'DM Mono', monospace; letter-spacing: 0.3px; }
.message.user .msg-name { text-align: right; color: rgba(99,102,241,0.6); }
.msg-text { font-size: 15px; line-height: 1.7; color: var(--text); white-space: pre-wrap; word-break: break-word; }
.message.user .msg-text { background: var(--user-bubble); border: 1px solid rgba(99,102,241,0.15); border-radius: 14px 3px 14px 14px; padding: 11px 15px; display: inline-block; float: right; clear: both; max-width: 86%; }
.typing-indicator { display: flex; gap: 5px; align-items: center; padding: 6px 0; }
.typing-indicator span { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); animation: bounce 1.2s ease-in-out infinite; }
.typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-5px); opacity: 1; } }
.input-area { border-top: 1px solid var(--border); padding: 14px 20px 18px; flex-shrink: 0; }
.input-box { max-width: 700px; margin: 0 auto; }
.input-wrap { display: flex; align-items: flex-end; gap: 8px; background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; padding: 10px 10px 10px 16px; transition: border-color 0.2s, box-shadow 0.2s; }
.input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
#input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; resize: none; min-height: 22px; max-height: 150px; line-height: 1.6; overflow-y: auto; scrollbar-width: none; }
#input::-webkit-scrollbar { display: none; }
#input::placeholder { color: var(--text3); }
#send { width: 34px; height: 34px; border-radius: 9px; background: var(--accent); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s, transform 0.1s, opacity 0.2s; }
#send:hover { background: #4f46e5; }
#send:active { transform: scale(0.95); }
#send:disabled { opacity: 0.3; cursor: not-allowed; }
#send svg { width: 15px; height: 15px; fill: white; }
.input-hint { text-align: center; font-size: 11px; color: var(--text3); margin-top: 9px; font-family: 'DM Mono', monospace; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-img"><img src="https://ibb.co/39Yq7nj1" alt="M" onerror="this.parentElement.textContent='M'"></div>
    <span class="logo-name">MoreshAI</span>
    <span class="logo-badge">beta</span>
  </div>
  <button class="new-chat-btn" onclick="newChat()">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Новый чат
  </button>
  <div class="sidebar-label">Сегодня</div>
  <div class="history-item active" id="hist-current">Новый чат</div>
  <div class="sidebar-footer">
    <div class="model-pill"><div class="online-dot"></div>llama-3.3-70b</div>
  </div>
</div>
<div class="main">
  <div class="topbar">
    <span class="topbar-name" id="topbar-name">MoreshAI</span>
    <div class="topbar-right">
      <button class="tbtn" onclick="newChat()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.95"/></svg>
      </button>
    </div>
  </div>
  <div id="chat">
    <div class="chat-inner" id="chat-inner">
      <div class="welcome" id="welcome">
        <div class="welcome-avatar"><img src="/static/MoreshAI-logo.jpg" alt="M" onerror="this.parentElement.textContent='M'"></div>
        <h1>Привет, я MoreshAI</h1>
        <p class="welcome-sub">Задай любой вопрос — я помогу</p>
        <div class="chips">
          <button class="chip" onclick="useChip(this)">Что такое чёрная дыра?</button>
          <button class="chip" onclick="useChip(this)">Напиши стихотворение</button>
          <button class="chip" onclick="useChip(this)">Как выучить Python?</button>
          <button class="chip" onclick="useChip(this)">Объясни квантовую физику</button>
        </div>
      </div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-box">
      <div class="input-wrap">
        <textarea id="input" placeholder="Напиши сообщение..." rows="1"></textarea>
        <button id="send" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
        </button>
      </div>
      <div class="input-hint">Enter — отправить · Shift+Enter — новая строка</div>
    </div>
  </div>
</div>
<script>
const chatEl=document.getElementById("chat"),inner=document.getElementById("chat-inner"),inputEl=document.getElementById("input"),sendBtn=document.getElementById("send"),welcome=document.getElementById("welcome");
let isFirst=true;
function useChip(btn){inputEl.value=btn.textContent;sendMessage();}
function newChat(){inner.innerHTML='';inner.appendChild(welcome);welcome.style.display='';isFirst=true;inputEl.value='';inputEl.style.height='22px';document.getElementById("hist-current").textContent="Новый чат";document.getElementById("topbar-name").textContent="MoreshAI";}
inputEl.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}});
inputEl.addEventListener("input",()=>{inputEl.style.height="22px";inputEl.style.height=Math.min(inputEl.scrollHeight,150)+"px";});
function addMsg(text,role){
  if(isFirst){welcome.style.display='none';const label=text.slice(0,30)+(text.length>30?"…":"");document.getElementById("hist-current").textContent=label;document.getElementById("topbar-name").textContent=label;isFirst=false;}
  const wrap=document.createElement("div");wrap.className=`message ${role}`;
  const av=document.createElement("div");av.className="msg-avatar";
  if(role==="bot"){av.innerHTML=`<img src="/static/MoreshAI-logo.jpg" alt="M" onerror="this.parentElement.textContent='M'">`;}else{av.textContent="Я";}
  const body=document.createElement("div");body.className="msg-body";
  const name=document.createElement("div");name.className="msg-name";name.textContent=role==="bot"?"MoreshAI":"Вы";
  const txt=document.createElement("div");txt.className="msg-text";txt.textContent=text;
  body.appendChild(name);body.appendChild(txt);wrap.appendChild(av);wrap.appendChild(body);inner.appendChild(wrap);chatEl.scrollTop=chatEl.scrollHeight;
}
function addTyping(){
  const wrap=document.createElement("div");wrap.className="message bot";wrap.id="typing";
  const av=document.createElement("div");av.className="msg-avatar";av.innerHTML=`<img src="/static/MoreshAI-logo.jpg" alt="M" onerror="this.parentElement.textContent='M'">`;
  const body=document.createElement("div");body.className="msg-body";
  const name=document.createElement("div");name.className="msg-name";name.textContent="MoreshAI";
  const dots=document.createElement("div");dots.className="typing-indicator";dots.innerHTML="<span></span><span></span><span></span>";
  body.appendChild(name);body.appendChild(dots);wrap.appendChild(av);wrap.appendChild(body);inner.appendChild(wrap);chatEl.scrollTop=chatEl.scrollHeight;
}
async function sendMessage(){
  const text=inputEl.value.trim();if(!text||sendBtn.disabled)return;
  inputEl.value="";inputEl.style.height="22px";sendBtn.disabled=true;
  addMsg(text,"user");addTyping();
  try{
    const res=await fetch("/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:text})});
    const data=await res.json();document.getElementById("typing")?.remove();addMsg(data.reply,"bot");
  }catch{document.getElementById("typing")?.remove();addMsg("Ошибка соединения.","bot");}
  sendBtn.disabled=false;inputEl.focus();
}
</script>
</body>
</html>
